      content="You want to turn the world upside down? Let's talk!"
    />

    <!-- Preload large image -->

    <!-- Stylesheets -->
    <link
      rel="stylesheet"
      href="https://lunevedy.com/assets/2.0/css/lunevedy.min.css"
    />
    <link rel="stylesheet" href="../assets/css/custom.css" />

    <!-- Google Fonts -->

    <!-- Font Awesome 6 icons. Delete if not using. -->

      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/img/favicons/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/img/favicons/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="assets/img/favicons/favicon-16x16.png"
    />
    <link rel="manifest" href="assets/img/favicons/site.webmanifest" />
  </head>

  <body>
    <!-- menu and 'hero block' header -->
    <nav class="theme-dark">
      <div class="container-menu">
        <a href="../index.html" class="brand">
          <img src="../assets/img/hito logo.png" alt="Logo" />
        </a>

        <div class="nav-toggle" id="nav-toggle-btn">
          <div class="bar-1"></div>
          <div class="bar-2"></div>
          <div class="bar-3"></div>
        </div>

        <ul class="links-wrapper">
          <li><a href="../index.html">Home</a></li>
          <li><a href="../portfolio/index.html">Portfolio</a></li>
          <li>
            <a href="../contact/index.html" class="btn btn-solid btn-soft"
              >Contact</a
            >
          </li>
        </ul>
      </div>
    </nav>
    <header class="theme-dark text-center-mobile">
      <div class="container-text w-1140px">
        <h1>Let's talk.</h1>
        <h2 class="contact-subtext">
          Got a project, a question, or just want to tell me why Coke Zero is a
          lie? Drop a line at
          <a href="mailto:antonioc.adolfo@gmail.com"
            >antonioc.adolfo@gmail.com</a
          >
          or use the terminal below.
        </h2>
      </div>
    </header>
    <!-- header ends here -->

    <!-- main content with sections -->
    <main>
      <!-- section starts here -->

      <section
        class="theme-dark section-selector-1 cols-2-half flex-row-reverse"
      >
        <div class="col-2 col-text">
          <form
            id="email-form"
            name="email-form"
            charset="utf-8"
            method="post"
            action="https://formspree.io/f/xvgnzzje"
          >
            <div class="form-row">
              <label for="full_name">name</label>
              <input type="text" name="full_name" id="full_name" required="" />
            </div>

            <div class="form-row">
              <label for="email_address">email</label>
              <input
                data-validate="email"
                aria-required="true"
                type="email"
                name="email_address"
                id="email_address"
                required=""
              />
            </div>

            <div class="form-row">
              <label for="form_message">message</label>
              <textarea
                aria-required="true"
                rows="3"
                name="form_message"
                id="form_message"
                required=""
              ></textarea>
            </div>

            <div class="form-footer">
              <button
                id="btn-submit"
                class="btn-solid"
                type="submit"
                data-validate="submit"
                aria-label="Send message"
              >
                <span>Send</span><i class="fas fa-arrow-right"></i>
              </button>
            </div>
          </form>
        </div>

        <div class="col-2 col-visual">
          <figure>
            <img src="../assets/img/contact.jpg" alt="Placeholder image" />
          </figure>
        </div>
      </section>

      <!-- section ends here -->
    </main>

    <!-- footer -->

    <footer class="theme-dark">
      <h2>Antonio Cruel</h2>
      <ul class="footer-icons">
        <li>
          <a href="#"><i class="fab fa-linkedin"></i></a>
        </li>
        <li>
          <a href="#"><i class="fab fa-github"></i></a>
        </li>
      </ul>
      <p class="privacy"><a href="../privacy.html">Privacy & Legal</a></p>
    </footer>

    <script src="https://lunevedy.com/assets/js/lunevedy.js"></script>
  </body>
</html>
